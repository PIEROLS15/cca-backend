name: Backend CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  backend:
    name: Install, Prisma, quality checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: comunidad_campesina_asia_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/comunidad_campesina_asia_ci"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Prisma version check
        run: |
          pnpm prisma -v
          pnpm list @prisma/client

      - name: Lint (if script exists)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            pnpm run lint
          else
            echo "No lint script configured"
          fi

      - name: Build (if script exists)
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            pnpm run build
          else
            echo "No build script configured"
          fi
