services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Lima
      PGTZ: America/Lima
    ports:
      - "127.0.0.1:${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 40s

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_TEST_PORT:-9101}:9001"
    environment:
      PORT: 9001
      TZ: America/Lima
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      RENIEC_PROVIDER: ${RENIEC_PROVIDER}
      RENIEC_CODART_TOKEN: ${RENIEC_CODART_TOKEN}
      RENIEC_CODART_URL: ${RENIEC_CODART_URL}
      RENIEC_DECOLECTA_TOKEN: ${RENIEC_DECOLECTA_TOKEN}
      RENIEC_DECOLECTA_URL: ${RENIEC_DECOLECTA_URL}
      API_BASE_URL: ${API_BASE_URL}
      BEARER_TOKEN: ${BEARER_TOKEN}

volumes:
  pgdata-test:
